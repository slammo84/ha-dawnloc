name: DAWNLoc Beta
version: 0.2.0-beta.3
slug: dawnloc
description: 'Beta: AP-basierte Raumortung, Raumanker und Datensicherung'
url: https://github.com/slammo84/ha-dawnloc
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
stage: experimental
ingress: true
ingress_port: 8099
panel_icon: mdi:map-marker-radius
panel_title: DAWNLoc
panel_admin: true
services:
  - mqtt:need
watchdog: http://[HOST]:[PORT:8099]/health
options:
  raw_topic: dawnloc/raw/hearing_map
  sample_ttl_seconds: 20
  offline_after_seconds: 300
  stable_seconds: 60
  sample_window: 7
  min_shared_aps: 2
  room_hold_seconds: 60
  switch_confidence: 70
  single_ap_threshold: -58
  log_level: info
schema:
  raw_topic: str
  sample_ttl_seconds: int(5,120)
  offline_after_seconds: int(15,600)
  stable_seconds: int(0,300)
  sample_window: int(1,30)
  min_shared_aps: int(2,10)
  room_hold_seconds: int(0,600)
  switch_confidence: int(50,95)
  single_ap_threshold: int(-80,-35)
  log_level: list(debug|info|warning|error)
