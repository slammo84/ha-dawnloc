name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            dawnloc/requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: pip install -r dawnloc/requirements.txt -r requirements-dev.txt
      - name: Lint Python
        run: ruff check dawnloc/app dawnloc/tests
      - name: Run tests
        run: pytest
      - name: Check shell syntax
        run: sh -n dawnloc/run.sh dawnloc/openwrt/dawnloc-agent dawnloc/openwrt/dawnloc.init dawnloc/openwrt/install.sh
      - name: Validate YAML and JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          for path in Path('.').rglob('*.yaml'):
              with path.open(encoding='utf-8') as handle:
                  yaml.safe_load(handle)
              print(path)

          for path in Path('dawnloc/app/static/locales').glob('*.json'):
              with path.open(encoding='utf-8') as handle:
                  json.load(handle)
              print(path)
          PY
      - name: Check JavaScript syntax
        run: node --check dawnloc/app/static/app.js
      - name: Build app image
        run: |
          docker build \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/base:3.23 \
            --build-arg BUILD_VERSION=ci \
            -t dawnloc:ci dawnloc
